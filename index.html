<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNKI-D | ROOT-SENSE AI TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #010810; --gold: #ffd700; --gain: #00ff88; --alert: #ff0055; }
        body { background: var(--bg); margin: 0; overflow: hidden; font-family: 'Share Tech Mono', monospace; color: var(--neon); }
        #canvas-3d { position: absolute; width: 100%; height: 100%; z-index: 1; opacity: 0.2; }
        
        .ui-layout { position: relative; z-index: 10; padding: 20px; height: 100vh; display: grid; grid-template-columns: 380px 1fr; gap: 20px; pointer-events: none; box-sizing: border-box; }
        .sidebar { pointer-events: auto; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); padding: 20px; backdrop-filter: blur(15px); display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .main-display { pointer-events: auto; background: rgba(0, 8, 16, 0.7); border: 1px solid rgba(0, 242, 255, 0.1); padding: 30px; position: relative; display: flex; flex-direction: column; }

        .status-header { text-transform: uppercase; font-size: 1.4rem; letter-spacing: 3px; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        .sub-header { color: var(--gold); font-size: 0.8rem; margin-bottom: 25px; }

        .asset-list { overflow-y: auto; flex-grow: 1; padding-right: 10px; }
        .asset-list::-webkit-scrollbar { width: 4px; }
        .asset-list::-webkit-scrollbar-thumb { background: var(--neon); }

        .asset-row { padding: 15px; border: 1px solid rgba(0, 242, 255, 0.1); margin-bottom: 10px; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.02); }
        .asset-row:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon); transform: translateX(5px); }
        .asset-row.active { background: rgba(0, 242, 255, 0.15); border-left: 5px solid var(--gold); border-color: var(--gold); }

        .chart-wrapper { flex-grow: 1; position: relative; margin-top: 20px; }
        .gov-panel { background: rgba(0, 15, 30, 0.9); border-top: 2px solid var(--gold); padding: 20px; margin-top: 20px; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        
        .label { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; }
        .val { color: white; font-size: 1.1rem; }
        .target-hl { color: var(--gain); font-weight: bold; }

        #chart-welcome { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .glitch { animation: glitch 2s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="canvas-3d"></div>

    <div class="ui-layout">
        <aside class="sidebar">
            <div class="status-header">SYSTEM ACTIVE</div>
            <div class="sub-header">>> ROOT-SENSE PREDICTIVE ENGINE v2.0</div>
            
            <div class="asset-list" id="asset-list">
                <div style="padding:20px; text-align:center;">CONNECTING TO COSMOS MAINNET...</div>
            </div>

            <div style="margin-top:20px; font-size:0.6rem; opacity:0.4;">
                ADAPTIVE CAUSALITY THEORY | MARCO 2026<br>
                DATA REFRESH: EVERY 60 SECONDS
            </div>
        </aside>

        <main class="main-display">
            <div id="chart-welcome">
                <h2 class="glitch" style="font-size: 2rem;">SELECT AN ASSET</h2>
                <p style="color: var(--gold);">INITIALIZING GOVERNANCE PROJECTION VECTORS...</p>
            </div>

            <div class="chart-wrapper">
                <canvas id="predictionChart"></canvas>
            </div>
            
            <div id="gov-panel" class="gov-panel" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0; color:var(--gold); letter-spacing:1px;">GOVERNANCE ADAPTATION REPORT</h3>
                    <div id="health-tag" style="background:var(--gain); color:black; padding:2px 8px; font-size:0.7rem; font-weight:bold;">ROOT HEALTH: OPTIMAL</div>
                </div>
                <div id="gov-details" style="font-size: 0.85rem; line-height: 1.5; color: #ddd;"></div>
            </div>
        </main>
    </div>

    <script>
        // --- ASSET CONFIGURATION (Based on your Portfolio) ---
        const ASSETS = [
            { id: 'injective-protocol', symbol: 'INJ', apr: 0.081, k: 1.68, gov: "PROPOSAL #624: Software Upgrade v1.18.2 implemented. MultiVM stability improved. PROPOSAL #625: Real World Asset (RWA) Oracle initialized. 2031 trajectory increased by +7.1% due to structural resilience." },
            { id: 'cosmos', symbol: 'ATOM', apr: 0.166, k: 1.28, gov: "PROPOSAL #1025: Transition to Hub v27.0.0. Removal of non-core consumer chains has streamlined the 'Mother Root'. Adaptive stability increased by +5.2%." },
            { id: 'akash-network', symbol: 'AKT', apr: 0.112, k: 1.42, gov: "UPGRADE #317: Enhanced Database Collections. Deployment scalability for AI-heavy roots confirmed. Structural growth factor adjusted to +4.1%." },
            { id: 'agoric', symbol: 'BLD', apr: 0.080, k: 1.45, gov: "PROPOSAL #117: Transparency mandate and Community-led Buyback Program. Shifting resources from marketing to token value scarcity. Efficiency multiplier: +6.5%." },
            { id: 'celestia', symbol: 'TIA', apr: 0.052, k: 1.45, gov: "Data Availability (DA) Layer expansion. Increasing network reach and interconnectivity with external ecosystems. +3.8% Reach Factor." },
            { id: 'axelar', symbol: 'AXL', apr: 0.127, k: 1.35, gov: "Interchain connectivity optimization. Axelar root confirmed as the primary bridge for institutional liquidity flow." },
            { id: 'stargaze', symbol: 'STARS', apr: 0.205, k: 1.15, gov: "NFT Infrastructure consolidation. Maintaining high-yield staking while reducing inflationary pressure through governance burns." },
            { id: 'chihuahua-token', symbol: 'HUAHUA', apr: 0.250, k: 1.08, gov: "Community-driven expansion. High-yield adaptive root with speculative growth potential." }
        ];

        let currentChart = null;

        // --- ORACLE SYNC ---
        async function fetchLivePrices() {
            try {
                const ids = ASSETS.map(a => a.id).join(',');
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=eur`);
                const data = await res.json();

                let listHTML = "";
                ASSETS.forEach(a => {
                    const price = data[a.id] ? data[a.id].eur : 0;
                    a.livePrice = price;
                    listHTML += `
                        <div class="asset-row" onclick="selectAsset('${a.id}')" id="row-${a.id}">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="asset-symbol">${a.symbol}</span>
                                <span class="val">€${price < 0.01 ? price.toFixed(5) : price.toFixed(2)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-top:5px; opacity:0.6; font-size:0.7rem;">
                                <span>APR: ${(a.apr*100).toFixed(1)}%</span>
                                <span class="target-hl">2031 PROJ: €${(price * Math.pow(1+a.apr, 5) * a.k).toFixed(2)}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('asset-list').innerHTML = listHTML;
            } catch (err) {
                document.getElementById('asset-list').innerHTML = "<div style='color:red'>ORACLE CONNECTION FAILED</div>";
            }
        }

        // --- INTERACTIVE CHART LOGIC ---
        function selectAsset(id) {
            const asset = ASSETS.find(a => a.id === id);
            
            document.querySelectorAll('.asset-row').forEach(r => r.classList.remove('active'));
            document.getElementById(`row-${id}`).classList.add('active');
            
            document.getElementById('chart-welcome').style.display = 'none';
            document.getElementById('gov-panel').style.display = 'block';
            document.getElementById('gov-details').innerHTML = asset.gov;

            renderChart(asset);
        }

        function renderChart(asset) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            if (currentChart) currentChart.destroy();

            const years = ['2026', '2027', '2028', '2029', '2030', '2031'];
            const projectionData = years.map((y, index) => {
                // Formula: LivePrice * (1+APR)^Years * Progressive K-Factor
                const progK = 1 + ((asset.k - 1) * (index / 5));
                return (asset.livePrice * Math.pow(1 + asset.apr, index) * progK).toFixed(2);
            });

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [{
                        label: `ADAPTIVE PRICE TRAJECTORY: ${asset.symbol} (EUR)`,
                        data: projectionData,
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        borderWidth: 3,
                        pointRadius: 6,
                        pointBackgroundColor: '#ffd700',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#00f2ff' } },
                        x: { grid: { display: false }, ticks: { color: '#00f2ff' } }
                    },
                    plugins: { 
                        legend: { labels: { color: '#00f2ff', font: { family: 'Share Tech Mono', size: 14 } } }
                    }
                }
            });
        }

        // --- 3D ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-3d').appendChild(renderer.domElement);
        const globe = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.1 }));
        scene.add(globe);
        camera.position.z = 6;
        function animate() { requestAnimationFrame(animate); globe.rotation.y += 0.001; renderer.render(scene, camera); }
        
        animate();
        fetchLivePrices();
        setInterval(fetchLivePrices, 60000);
    </script>
</body>
</html>
